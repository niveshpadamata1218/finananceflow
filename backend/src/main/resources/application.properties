spring.application.name=FinanceFlow AI

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/swecha_ap?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootroot}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

server.port=${PORT:8082}

app.security.jwt-secret=${JWT_SECRET:financeflow-secret-change-me-financeflow-secret-change-me}
app.security.access-token-minutes=${ACCESS_TOKEN_MINUTES:120}
app.security.refresh-token-days=${REFRESH_TOKEN_DAYS:30}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
